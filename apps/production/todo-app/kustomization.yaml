apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: production

resources:
  - deployment.yaml
  - service.yaml
  - ServiceAccount.yaml


# Use 'labels' instead of deprecated 'commonLabels'
labels:
  - pairs:
      app: todo-app
      environment: production
      managed-by: argocd

# Fix the configMapGenerator - remove the merge behavior
configMapGenerator:
  - name: todo-app-config
    behavior: create  # Changed from 'merge' to 'create'
    literals:
      - LOG_LEVEL=INFO
      - DATABASE_NAME=todo
      - FLASK_ENV=production

# Keep the image reference
images:
  - name: 175076060567.dkr.ecr.eu-west-2.amazonaws.com/production/todoapp
    newTag: latest
